<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Samesta</title>
    <link rel="stylesheet" href="style.css">

    <script>
        if(localStorage.getItem("isLogin") !== "true"){
    window.location.href = "login.html";
}
    </script>
</head>

<body>

<nav class="admin-nav">

    <div class="logo-area">

        <img src="images/logo-samesta-bg.png" class="admin-logo">

        <div class="logo">
            Samesta Admin
        </div>

    </div>

    <ul>
        <li><a href="index.html">Website</a></li>
        <li><a href="admin.html">Dashboard</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>

</nav>

<section class="admin">

   <div class="admin-top">

    <button onclick="exportExcel()" class="export-btn">
        Export Excel
    </button>

    <span>ADMIN DASHBOARD</span>
    <h2>Dashboard Booking Apartement</h2>

</div>
    <input
        type="text"
        id="searchInput"
        class="search-box"
        placeholder="Cari nama, nomor HP, atau email..."
    >

    <div class="stats-container">
        <div class="stat-card">
            <h3>Total Booking</h3>
            <p id="totalBooking">0</p>
        </div>

        <div class="stat-card">
            <h3>Booking Hari Ini</h3>
            <p id="todayBooking">0</p>
        </div>

        <div class="stat-card">
            <h3>Booking Bulan Ini</h3>
            <p id="monthBooking">0</p>
        </div>
    </div>

    <div class="chart-card">
        <h3>Grafik Booking Berdasarkan Tipe Unit</h3>
        <canvas id="unitChart"></canvas>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>No HP</th>
                    <th>Email</th>
                    <th>Tanggal Kunjungan</th>
                    <th>Tipe Unit</th>
                    <th>Status</th>
                    <th>Waktu Booking</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="bookingTable"></tbody>
        </table>
    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>

</body>
</html>
